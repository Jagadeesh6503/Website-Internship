# ================================================================
#  Online Art Gallery — Spring Boot Application Properties (MySQL)
# ================================================================

# Server
server.port=8080

# ── MySQL Database ──
spring.datasource.url=jdbc:mysql://localhost:3306/art_gallery_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── JWT ──
app.jwt.secret=ArtVault2025SecretKeyVeryLongAndSecureMin256BitsForHS256AlgorithmProductionReady
app.jwt.expiration-ms=86400000

# ── File Upload ──
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
app.upload.dir=uploads/artworks

# ── CORS Origins (frontend) ──
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5500,http://127.0.0.1:5500,http://localhost:5501,http://127.0.0.1:5501,null

# ── Logging ──
logging.level.com.artgallery=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
