<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login — ArtVault</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-grid">
    <div class="auth-visual">
      <div class="auth-visual__art"><img src="https://picsum.photos/seed/login/600/320" alt="Art"/></div>
      <div class="auth-visual__quote">
        <p>"Art enables us to find ourselves and lose ourselves at the same time."</p>
        <cite>— Thomas Merton</cite>
      </div>
    </div>
    <div class="auth-form-side">
      <a href="index.html" class="auth-logo">🎨 ArtVault</a>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to explore, collect and bid on world-class art.</p>
      <div class="auth-social">
        <button class="auth-social-btn">🌐 Google</button>
        <button class="auth-social-btn">f Facebook</button>
      </div>
      <div class="auth-divider"><span>or sign in with email</span></div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-control" type="email" id="loginEmail" placeholder="Enter your email" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" id="loginPassword" placeholder="Enter your password" required/>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
          <label style="display:flex;align-items:center;gap:.5rem;font-size:.875rem;cursor:pointer;">
            <input type="checkbox" id="rememberMe" style="accent-color:var(--gold);"/>Remember me
          </label>
          <a href="#" style="font-size:.875rem;color:var(--gold);">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="loginSubmitBtn">Sign In →</button>
      </form>
      <div class="auth-footer">Don't have an account? <a href="register.html">Create one</a></div>
    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
